<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>archive</title>

  <style>
    body {
      margin: 0;
      background: #f4f1e8;
      font-family: sans-serif;
      color: #222;
    }

    .cover {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .cover img {
      width: 60%;
      max-width: 600px;
      min-width: 220px;
      height: auto;
      display: block;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    #archive {
      width: min(760px, 88vw);
      margin: 0 auto;
      padding: 48px 0 80px;
    }

    .post-card {
      margin-bottom: 56px;
    }

    .post-image,
    .post-video {
      width: 100%;
      display: block;
      margin-bottom: 12px;
      background: #ddd;
    }

    .post-title {
      display: inline-block;
      padding: 3px 6px;
      background: #e2cfaa;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .post-text {
      font-size: 15px;
      line-height: 1.65;
      margin-bottom: 8px;
      white-space: pre-wrap;
    }

    .post-date {
      font-size: 12px;
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      .cover img {
        width: 78%;
        min-width: 0;
      }

      #archive {
        width: min(92vw, 760px);
        padding: 28px 0 56px;
      }
    }
  </style>
</head>
<body>

  <div class="cover">
    <img src="images/cover.jpg" alt="cover" onclick="goArchive()">
  </div>

  <div id="archive" class="hidden"></div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }

    const posts = [
      {
        title: "body signal",
        image: "/images/uploads/sample-image.jpg",
        video: "",
        body: "the sounds of pouring, still held in the surface.",
        date: "2026-04-14"
      },
      {
        title: "message",
        image: "",
        video: "/images/uploads/sample-video.mp4",
        body: "a slight interruption stayed longer than expected.",
        date: "2026-04-15"
      }
    ];

    function goArchive() {
      document.querySelector(".cover").style.display = "none";
      const archive = document.getElementById("archive");
      archive.classList.remove("hidden");
      archive.innerHTML = "";

      posts.forEach((post) => {
        const card = document.createElement("div");
        card.className = "post-card";

        if (post.image) {
          const img = document.createElement("img");
          img.src = post.image;
          img.alt = post.title || "";
          img.className = "post-image";
          card.appendChild(img);
        }

        if (post.video) {
          const video = document.createElement("video");
          video.src = post.video;
          video.controls = true;
          video.playsInline = true;
          video.className = "post-video";
          card.appendChild(video);
        }

        if (post.title) {
          const title = document.createElement("div");
          title.className = "post-title";
          title.textContent = post.title;
          card.appendChild(title);
        }

        if (post.body) {
          const text = document.createElement("div");
          text.className = "post-text";
          text.textContent = post.body;
          card.appendChild(text);
        }

        if (post.date) {
          const date = document.createElement("div");
          date.className = "post-date";
          date.textContent = post.date;
          card.appendChild(date);
        }

        archive.appendChild(card);
      });
    }
  </script>

</body>
</html>
