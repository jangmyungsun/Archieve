<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cover">
  <img src="images/cover.jpg" onclick="goArchive()">
</div>

<div id="archive" class="hidden"></div>

<script>
const images = [
  "images/cover.jpg"
];

function goArchive() {
  document.querySelector('.cover').style.display = 'none';
  const archive = document.getElementById('archive');
  archive.classList.remove('hidden');

  images.forEach(src => {
    const img = document.createElement('img');
    img.src = src;
    archive.appendChild(img);
  });
}
</script>

</body>
